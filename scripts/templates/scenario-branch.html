<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920">
  <title>{{SLIDE_TITLE}}</title>
  <link rel="stylesheet" href="../assets/css/pds-tokens.css">
  <link rel="stylesheet" href="../assets/css/slide-base.css">
  <link rel="stylesheet" href="../assets/css/animations.css">
  <script>(function(){function s(){document.documentElement.style.setProperty('--scale',Math.min(window.innerWidth/1920,window.innerHeight/920));}s();window.addEventListener('resize',s);})();</script>
  <style>
    /* ── Header ─────────────────────────────────────────────────── */
    .sb-header {
      position: absolute; top: 0; left: 0; right: 0;
      padding: 32px 80px 0;
      z-index: 5;
    }
    .sb-header__title {
      margin: 0;
      font-size: 44px;
      font-weight: var(--pds-font-weight-bold, 700);
      letter-spacing: -0.01em;
      color: var(--pds-text-primary);
    }

    /* ── Main 2-column layout (above the image strip) ─────────── */
    .sb-layout {
      position: absolute;
      top: 130px; height: 450px;
      left: 80px; right: 80px;
      display: grid; grid-template-columns: 1fr 1fr;
      column-gap: 64px;
      z-index: 5;
    }

    /* ── Left column: setup ─────────────────────────────────────── */
    .sb-setup {
      display: flex; flex-direction: column;
      gap: 20px; justify-content: flex-start;
    }
    .sb-setup__intro {
      font-size: 22px;
      color: var(--pds-text-secondary);
      line-height: 1.5;
    }
    .sb-speech {
      position: relative;
      background: var(--pds-bg-surface);
      border: 1px solid var(--pds-border-strong);
      border-left: 4px solid var(--pds-accent);
      padding: 28px 36px;
      border-radius: 16px;
      font-size: 28px; line-height: 1.35;
      color: var(--pds-text-primary);
      font-style: italic;
      max-width: 720px;
    }
    .sb-speech::before {
      content: '\201C';
      position: absolute;
      top: -28px; left: 24px;
      font-size: 110px; line-height: 1;
      font-family: Georgia, serif;
      color: var(--pds-accent);
      font-style: normal;
    }
    .sb-speech__attr {
      margin-top: 18px;
      font-style: normal;
      font-size: 16px;
      color: var(--pds-text-muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* ── Right column: prompt + choices + consequence ────────────
       Structurally mirrors the left column (one "header" element
       above the first interactive item) so the first choice aligns
       with the top of the speech bubble. */
    .sb-right {
      display: flex; flex-direction: column;
      gap: 20px; justify-content: flex-start;
      position: relative;
    }
    .sb-prompt {
      display: inline-flex; align-items: center; gap: 12px;
      font-size: 22px; line-height: 1.5;
      color: var(--pds-text-secondary);
      margin: 0;
    }
    .sb-prompt__dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--pds-accent);
      flex-shrink: 0;
      animation: sb-vo-pulse 1.2s ease-in-out infinite;
    }
    .sb-prompt.is-ready .sb-prompt__dot { display: none; }
    @keyframes sb-vo-pulse {
      0%, 100% { opacity: 0.35; transform: scale(0.85); }
      50%      { opacity: 1;    transform: scale(1); }
    }

    /* ── Choice buttons ────────────────────────────────────────── */
    .sb-choice {
      display: flex; align-items: center; gap: 18px;
      text-align: left;
      background: var(--pds-bg-surface);
      border: 1px solid var(--pds-border);
      color: var(--pds-text-primary);
      font-family: var(--pds-font-family);
      font-size: 19px; line-height: 1.35;
      padding: 16px 22px;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.18s, border-color 0.18s,
                  transform 0.18s, opacity 0.25s;
    }
    .sb-choice:hover:not(:disabled) {
      background: var(--pds-bg-surface-hover, #2A2B2F);
      border-color: var(--pds-border-strong);
      transform: translateX(4px);
    }
    .sb-choice:disabled {
      cursor: not-allowed; opacity: 0.45; transform: none;
    }
    .sb-choice__num {
      flex-shrink: 0;
      width: 40px; height: 40px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%;
      background: rgba(255,255,255,0.06);
      font-size: 16px;
      font-weight: var(--pds-font-weight-bold, 700);
      color: var(--pds-text-muted);
      transition: background 0.18s, color 0.18s;
    }
    .sb-choice__text { flex: 1; }
    .sb-choice__mark {
      flex-shrink: 0;
      width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%;
      font-size: 18px;
      font-weight: var(--pds-font-weight-bold, 700);
      opacity: 0;
      transition: opacity 0.25s;
    }
    .sb-choice.is-correct {
      border-color: var(--pds-success);
      background: rgba(9,208,135,0.08);
      opacity: 1;
    }
    .sb-choice.is-correct .sb-choice__num {
      background: var(--pds-success); color: #000;
    }
    .sb-choice.is-correct .sb-choice__mark {
      background: var(--pds-success); color: #000; opacity: 1;
    }
    .sb-choice.is-wrong {
      border-color: var(--pds-error);
      background: rgba(252,64,64,0.06);
    }
    .sb-choice.is-wrong .sb-choice__num {
      background: var(--pds-error); color: #fff;
    }
    .sb-choice.is-wrong .sb-choice__mark {
      background: var(--pds-error); color: #fff; opacity: 1;
    }

    /* ── Consequence card ──────────────────────────────────────── */
    .sb-consequence {
      display: none;   /* hidden in layout until a pick is made */
      margin-top: 4px;
      background: var(--pds-bg-surface);
      border: 1px solid var(--pds-border-strong);
      border-left: 4px solid var(--pds-text-muted);
      padding: 16px 22px;
      border-radius: 12px;
      font-size: 17px; line-height: 1.45;
      color: var(--pds-text-secondary);
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.3s, transform 0.3s, border-color 0.3s;
    }
    .sb-consequence.is-visible {
      display: block;
      opacity: 1;
      transform: none;
    }
    .sb-consequence.is-correct { border-left-color: var(--pds-success); }
    .sb-consequence.is-wrong   { border-left-color: var(--pds-error); }
    .sb-consequence__label {
      display: block;
      font-size: 12px; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--pds-text-muted);
      margin-bottom: 8px;
    }

    /* ── Reflection (post-correct takeaway) ──────────────────────
       Authored slides without a Reflection-Text render the wrapper
       with the `sb-reflection--absent` class so it's removed from
       layout entirely. Reflection slides keep the wrapper but hide
       it via `display: none` until the correct pick lands. */
    .sb-reflection {
      display: none;
      margin-top: 16px;
      padding: 16px 24px;
      background: rgba(9,208,135,0.08);
      border: 1px solid rgba(9,208,135,0.3);
      border-radius: 8px;
      font-size: 18px;
      color: var(--pds-text-primary);
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.4s 0.2s, transform 0.4s 0.2s;
    }
    .sb-reflection.is-visible {
      display: block;
      opacity: 1;
      transform: none;
    }
    .sb-reflection--absent { display: none !important; }

    /* ── Wide-screen image strip at the bottom ─────────────────── */
    .sb-imagestrip {
      position: absolute;
      left: 0; right: 0;
      top: 600px; bottom: 0;
      z-index: 4;
      overflow: hidden;
    }
    .sb-imagestrip img {
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center 45%;
      filter: saturate(1.05) contrast(1.02);
    }
    .sb-imagestrip::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(14,14,18,0.85) 0%,
        rgba(14,14,18,0.0) 22%,
        rgba(14,14,18,0.0) 100%
      );
      pointer-events: none;
    }

    /* ── Background dim above the image strip ──────────────────── */
    .sb-bg {
      position: absolute; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse at 70% 30%, rgba(213,0,28,0.10), transparent 60%),
        linear-gradient(135deg, #1A1A1F 0%, var(--pds-bg-base) 60%);
    }
    .sb-bg::after {
      content: ''; position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 64px 64px;
      pointer-events: none;
    }
  
    /* ── Scenario-branch v2.1: compact stack, bigger bottom image ── */
    .sb-header { padding-top: 80px; }                       /* lower the title */
    .sb-layout { top: 150px; height: auto !important; bottom: 360px; }  /* lower content; zone 150–560 */
    .sb-right  { gap: 12px; }
    .sb-prompt { font-size: 20px; }
    .sb-choice { padding: 11px 18px; font-size: 17px; }
    .sb-choice__num { width: 34px; height: 34px; font-size: 15px; }
    .sb-choice__mark { width: 28px; height: 28px; }
    .sb-outcome {
      display: none;
      margin-top: 12px;
      background: var(--pds-bg-base);     /* solid + opaque so text stays readable */
      border: 1px solid var(--pds-border-strong);
      border-radius: 14px;
      padding: 14px 20px;
      box-shadow: 0 8px 28px rgba(0,0,0,0.5);
    }
    .sb-outcome.is-shown { display: block; }
    .sb-consequence {
      display: block !important;
      margin: 0; background: none; border: none; border-radius: 0;
      box-shadow: none; opacity: 1; transform: none;
      border-left: 3px solid var(--pds-text-muted);
      padding: 0 0 0 14px; font-size: 16px;
    }
    .sb-consequence.is-correct { border-left-color: var(--pds-success); }
    .sb-consequence.is-wrong   { border-left-color: var(--pds-error); }
    .sb-reflection {
      margin: 12px 0 0; padding: 11px 16px; border-radius: 8px;
      background: rgba(9,208,135,0.14);
      border: 1px solid rgba(9,208,135,0.40);
      opacity: 1; transform: none; font-size: 16px;
    }
    .sb-reflection.is-visible { display: block; }
    .sb-choice.is-active { box-shadow: 0 0 0 2px var(--pds-accent) inset; }
    .sb-choice.is-wrong  { opacity: 1; }
    .sb-imagestrip { top: 560px; }

  </style>
</head>
<body>

<div class="slide" data-slide-id="{{SLIDE_ID}}">

  <div class="sb-bg"></div>

  <header class="sb-header">
    <h1 class="sb-header__title">{{SLIDE_TITLE}}</h1>
  </header>

  <div class="sb-layout">
    <section class="sb-setup">
      <p class="sb-setup__intro">{{SETUP_TEXT}}</p>
      <div class="sb-speech">
        {{CUSTOMER_LINE}}
        <div class="sb-speech__attr">— Customer</div>
      </div>
    </section>

    <section class="sb-right">
      <p class="sb-prompt" id="sb-prompt">
        <span class="sb-prompt__dot" aria-hidden="true"></span>
        <span id="sb-prompt-text"></span>
      </p>

      {{CHOICES_HTML}}

      <div class="sb-outcome">
        <div class="sb-consequence" id="sb-consequence">
        <span class="sb-consequence__label" id="sb-conseq-label">Consequence</span>
        <div id="sb-conseq-text">Pick a response to see what happens.</div>
      </div>

      <div class="sb-reflection" id="sb-reflection" data-has-text="{{REFLECTION_HAS_TEXT}}">
        {{REFLECTION_TEXT}}
      </div>
      </div>
    </section>
  </div>

  <div class="sb-imagestrip">
    <img data-img-adjust src="{{IMAGE_PATH}}" alt="" style="--img-pos:{{IMG_POS}};--img-scale:{{IMG_SCALE}};"
         onerror="this.onerror=null;this.style.display='none';">
  </div>

</div>

<script src="../assets/vendor/gsap/gsap.min.js"></script>
<script src="../assets/vendor/porsche-components.js"></script>
<script>
/* ── SandboxRuntime shim ─────────────────────────────────────────────────── */
var SandboxRuntime = (function () {
  var CR = (function () {
    try { return window.parent && window.parent.CourseRuntime ? window.parent.CourseRuntime : null; }
    catch (_) { return null; }
  })();

  function makeFakeVO() {
    var listeners = {};
    var obj = {
      currentTime: 0,
      _wasPlaying: false,
      addEventListener: function (e, f) { (listeners[e] = listeners[e] || []).push(f); },
      removeEventListener: function (e, f) {
        if (listeners[e]) listeners[e] = listeners[e].filter(function (g) { return g !== f; });
      },
      _fire: function (e) { (listeners[e] || []).forEach(function (f) { f(); }); },
      play: function () { return Promise.resolve(); }
    };
    (function poll() {
      requestAnimationFrame(function () {
        if (CR) {
          obj.currentTime = CR.getAudioCurrentTime ? CR.getAudioCurrentTime() : 0;
          var p = CR.isAudioPlaying ? CR.isAudioPlaying() : false;
          if (!obj._wasPlaying && p) obj._wasPlaying = true;
          if (obj._wasPlaying && !p && obj.currentTime > 0) {
            if (!(document.querySelector('.slide') || {classList:{contains:function(){return false;}}}).classList.contains('is-paused')) {
              obj._wasPlaying = false;
              obj._fire('ended');
            }
          }
          obj._fire('timeupdate');
        }
        poll();
      });
    })();
    return obj;
  }

  return { voAudio: makeFakeVO() };
})();

/* ── Scenario-branch slide logic (v2: retry until correct + review) ──────── */
(function () {
  // Lock player Next on entry — only the correct choice unlocks it
  try { window.parent.postMessage({ type: 'sandbox-lock-next' }, '*'); } catch (_) {}

  var promptEl    = document.getElementById('sb-prompt');
  var promptText  = document.getElementById('sb-prompt-text');
  var outcomeEl   = document.querySelector('.sb-outcome');
  var conseqEl    = document.getElementById('sb-consequence');
  var conseqLabel = document.getElementById('sb-conseq-label');
  var conseqText  = document.getElementById('sb-conseq-text');
  var reflectEl   = document.getElementById('sb-reflection');
  var choiceEls   = Array.prototype.slice.call(document.querySelectorAll('.sb-choice'));

  var introDone = false;
  var solved    = false;   // true once the correct choice has been picked

  // Shuffle the choice buttons so position doesn't telegraph the answer
  (function shuffleChoices() {
    var parent = choiceEls[0] && choiceEls[0].parentNode;
    if (!parent) return;
    for (var i = choiceEls.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var tmp = choiceEls[i]; choiceEls[i] = choiceEls[j]; choiceEls[j] = tmp;
    }
    choiceEls.forEach(function (el, idx) {
      parent.appendChild(el);
      el.querySelector('.sb-choice__num').textContent = idx + 1;
    });
  })();

  // Choices stay disabled until the INTRO VO ends
  choiceEls.forEach(function (b) { b.disabled = true; });

  function onIntroEnd() {
    if (introDone) return;
    introDone = true;
    promptEl.classList.add('is-ready');
    promptText.textContent = 'What do you say?';
    choiceEls.forEach(function (b) { b.disabled = false; });
  }
  SandboxRuntime.voAudio.addEventListener('ended', onIntroEnd);
  // Safety net: if VO never fires (e.g. standalone preview), unlock after 20s
  setTimeout(onIntroEnd, 20000);

  // Show a choice's consequence in the outcome panel
  function showOutcome(btn, isCorrect) {
    choiceEls.forEach(function (b) { b.classList.remove('is-active'); });
    btn.classList.add('is-active');
    if (outcomeEl) outcomeEl.classList.add('is-shown');
    conseqEl.classList.remove('is-correct', 'is-wrong');
    conseqEl.classList.add('is-visible', isCorrect ? 'is-correct' : 'is-wrong');
    conseqLabel.textContent = isCorrect ? 'Outcome' : 'Consequence';
    conseqText.textContent  = btn.getAttribute('data-consequence') || '';
  }

  function pick(btn) {
    if (!introDone) return;
    var isCorrect = btn.getAttribute('data-correct') === 'true';

    // Persistent marking so the learner can always see which were right/wrong
    btn.classList.add(isCorrect ? 'is-correct' : 'is-wrong');
    var mark = btn.querySelector('.sb-choice__mark');
    if (mark) mark.textContent = isCorrect ? '✓' : '✗';

    showOutcome(btn, isCorrect);

    // First correct pick: reveal takeaway + unlock Next (once). Choices stay
    // clickable afterward so the learner can review every consequence.
    if (isCorrect && !solved) {
      solved = true;
      if (reflectEl && reflectEl.getAttribute('data-has-text') === 'true') {
        reflectEl.classList.add('is-visible');
      }
      try { window.parent.postMessage({ type: 'sandbox-unlock-next' }, '*'); } catch (_) {}
    }
  }

  choiceEls.forEach(function (b) {
    b.addEventListener('click', function () { pick(b); });
  });
})();
</script>

</body>
</html>
